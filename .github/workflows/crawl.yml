name: daily-crawl

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run crawler
        run: python -m pipeline.run
      - name: Commit updated data
        run: |
          git config user.name "jeju-biz-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/announcements.json data/crawl_report.json
          git diff --cached --quiet || git commit -m "chore: data update $(date -u +%F)"
          git push
